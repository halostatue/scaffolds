name = "{{ .ProjectSnake }}"
version = "1.0.0"
target = "javascript"
description = "{{ .Scaffold.description }}"
licences = [
  {{ if .Computed.hasApache }}"Apache-2.0",{{ end }}
  {{ if .Computed.hasMit }}"MIT",{{ end }}
]
gleam = ">= {{ .Computed.gleamMinVersion }}"

[repository]
type = "github"
user = "{{ .Scaffold.githubOwner }}"
repo = "{{ .ProjectSnake }}"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"
gleam_json = ">= 3.0.0 and < 4.0.0"
gleam_fetch = ">= 1.3.0 and < 2.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_javascript = ">= 1.0.0 and < 2.0.0"
envoy = ">= 1.1.0 and < 2.0.0"
pontil = ">= 1.0.0 and < 2.0.0"
tom = ">= 2.0.0 and < 3.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
filepath = ">= 1.0.0 and < 2.0.0"
shellout = ">= 1.8.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
qcheck = ">= 1.0.0 and < 2.0.0"
pontil_build = ">= 1.0.0 and < 2.0.0"
glinter = ">= 2.15.0 and < 3.0.0"

[tools.glinter]
stats = true

[tools.glinter.rules]
ffi_usage = "warning"
function_complexity = "warning"
module_complexity = "warning"

[tools.pontil_build.bundle]
entry = "{{ .ProjectSnake }}_action.gleam"
