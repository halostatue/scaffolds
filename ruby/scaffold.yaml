# yaml-language-server: $schema=https://hay-kot.github.io/scaffold/schema.json
messages:
  pre: |
    # Ruby Project Scaffold

    Generate a new Ruby gem with Hoe, Minitest, and standard tooling.

  post: |
    # Get Started

    ```sh
    cd {{ .ProjectSnake }}
    bundle install
    rake test
    ```

presets:
  default:
    rubyVersion: ">= 3.3"

  test:
    description: "Test ruby scaffold"
    githubOwner: "test-owner"
    authorName: "Test Author"
    authorEmail: "test@example.com"
    rubyVersion: ">= 3.3"
    ciRubyVersion: "4.0"
    rubyMatrixVersions: "3.3 3.4 4.0"
    licenceId: "Apache-2.0"

questions:
  - name: "description"
    group: "project"
    prompt:
      message: "Project description"
      multi: true
    required: true

  - name: "githubOwner"
    group: "project"
    prompt:
      message: "GitHub owner (user or org)"
    required: true

  - name: "authorName"
    group: "project"
    prompt:
      message: "Author/Maintainer name (optional, defaults to GitHub owner)"

  - name: "authorEmail"
    group: "project"
    prompt:
      message: "Author email"
    required: true

  - name: "rubyVersion"
    group: "project"
    prompt:
      message: "Minimum Ruby version"
      default: ">= 3.3"

  - name: "ciRubyVersion"
    group: "project"
    prompt:
      message: "Ruby version for CI (lint/coverage)"
      default: "4.0"

  - name: "rubyMatrixVersions"
    group: "project"
    prompt:
      message: "Ruby versions for CI matrix (space-separated)"
      default: "3.3 3.4 4.0"

  - name: "licenceId"
    group: "licence"
    prompt:
      message: "License"
      default: "Apache-2.0"
      options:
        - "Apache-2.0"
        - "MIT"
        - "Apache-2.0 and MIT"

  - name: "useGithubActions"
    group: "ci"
    prompt:
      confirm: "Enable GitHub Actions?"
      default: true

  - name: "useDependabot"
    group: "ci"
    prompt:
      confirm: "Enable Dependabot?"
      default: true

  - name: "useGitHubFunding"
    group: "project"
    prompt:
      confirm: "Enable GitHub Funding?"
      default: true

computed:
  author: "{{ or .Scaffold.authorName .Scaffold.githubOwner }}"
  elixirVersion: "~> 1.{{ .Scaffold.elixirVersion }}"
  githubRepoName: "{{ .Scaffold.githubOwner }}/{{ .ProjectSnake }}"
  githubUrl: "https://github.com/{{ .Scaffold.githubOwner }}/{{ .ProjectSnake }}"
  hasApache: '{{ or (eq .Scaffold.licenceId "Apache-2.0") (eq .Scaffold.licenceId "Apache-2.0 and MIT") }}'
  hasMit: '{{ or (eq .Scaffold.licenceId "MIT") (eq .Scaffold.licenceId "Apache-2.0 and MIT") }}'
  isDual: '{{ eq .Scaffold.licenceId "Apache-2.0 and MIT" }}'
  year: '{{ now | date "2006" }}'

features:
  - value: "{{ .Scaffold.useGithubActions }}"
    globs:
      - "**/.github/workflows/**"
      - "**/.github/zizmor.yml"

  - value: "{{ .Scaffold.useDependabot }}"
    globs:
      - "**/.github/dependabot.yml"

  - value: "{{ .Computed.hasApache }}"
    globs:
      - "**/licences/APACHE-2.0.txt"

  - value: "{{ .Computed.hasMit }}"
    globs:
      - "**/licences/MIT.txt"

  - value: "{{ .Scaffold.useGitHubFunding }}"
    globs:
      - "**/.github/FUNDING.yml"

delimiters:
  - glob: "**/.github/workflows/**"
    left: "#[[["
    right: "]]]"
